services:
  uptime-kuma:
    image: ${UPTIME_KUMA_IMAGE_REF}
    container_name: replife-uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    environment:
      TZ: ${TZ:-America/New_York}
      UMASK: "0022"
    networks:
      - uptime-kuma-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  uptime-kuma-data:

networks:
  uptime-kuma-network:
    driver: bridge
